name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test (unprivileged)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # The configparser differential tests spawn python3; guarantee it is present
    # so they run for real here rather than skipping.
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup component add clippy rustfmt
        rustup default stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}

    - name: rustfmt
      run: cargo fmt --all --check

    - name: clippy
      run: cargo clippy --all-features --all-targets -- -D warnings

    # The net (io_uring) tests skip themselves when a ring can't be created. We
    # do NOT want that to pass silently as green, so force them to run below —
    # but first fail fast and legibly if this runner has io_uring restricted,
    # so a red is clearly "runner can't do io_uring" and not a net-code bug.
    # (io_uring_disabled: 0 = on for everyone, 1 = unprivileged blocked, 2 =
    # off; an absent sysctl predates the knob and means io_uring is on.)
    - name: Verify io_uring is available
      run: |
        disabled=$(cat /proc/sys/kernel/io_uring_disabled 2>/dev/null || echo 0)
        if [ "$disabled" != "0" ]; then
          echo "::error::io_uring restricted on this runner (io_uring_disabled=$disabled); net tests cannot run here"
          exit 1
        fi
        echo "io_uring available (io_uring_disabled=$disabled)"

    # The ZFS-backed and privileged tests skip automatically here (no datasets,
    # unprivileged); the QEMU VM job exercises them for real. Two otherwise-
    # silent skips are turned into hard failures: the configparser differential
    # tests (REQUIRE_PYTHON) and the net server/client tests (REQUIRE_IO_URING,
    # backed by the ring probe above that guarantees they can actually run).
    - name: test
      run: cargo test --all-features
      env:
        TRUENAS_ROS_REQUIRE_PYTHON: "1"
        TRUENAS_ROS_REQUIRE_IO_URING: "1"

    - name: feature-matrix builds
      run: |
        cargo build --no-default-features
        cargo build --all-features

    - name: docs
      run: cargo doc --all-features --no-deps
