name: QEMU VM Tests

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      train:
        description: 'TrueNAS train to test against (master or 26; default: derived from branch)'
        type: string
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

# Bump IMAGE_VERSION to bust the cached Debian cloud image (e.g. when it has
# drifted). The TrueNAS kernel and OpenZFS debs are downloaded fresh from their
# rolling <train>-nightly releases every run, so they are not tied to this key.
env:
  IMAGE_VERSION: v1

jobs:
  qemu-test:
    name: Debian Trixie QEMU Test (TrueNAS kernel + ZFS)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Determine TrueNAS train
      id: train
      # Every one of these is a context value, not a literal: pass them through
      # `env:` and quote them in the shell rather than interpolating `${{ }}`
      # into the script, so a ref or dispatch input can never be read as shell.
      env:
        TRAIN_INPUT: ${{ inputs.train }}
        EVENT_NAME: ${{ github.event_name }}
        BASE_REF: ${{ github.base_ref }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        # An explicit input wins; otherwise map the branch (the PR base on
        # PRs, else the triggering ref) to its train.
        if [ -n "$TRAIN_INPUT" ]; then
          TRAIN="$TRAIN_INPUT"
        elif [ "$EVENT_NAME" = "pull_request" ]; then
          TRAIN="$(.github/workflows/scripts/train-for-ref.sh "$BASE_REF")"
        else
          TRAIN="$(.github/workflows/scripts/train-for-ref.sh "$REF_NAME")"
        fi
        # The train names a release tag and a filesystem path in the VM; keep it
        # to the shape train-for-ref.sh produces so a hand-typed dispatch input
        # cannot smuggle anything else through.
        case "$TRAIN" in
          master|[0-9]*) ;;
          *) echo "ERROR: unexpected train '$TRAIN'"; exit 1 ;;
        esac
        echo "train=$TRAIN" >> "$GITHUB_OUTPUT"
        echo "Using TrueNAS train: $TRAIN"

    - name: Setup QEMU
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-1-setup.sh

    - name: Cache Debian Trixie image
      uses: actions/cache@v4
      with:
        path: /tmp/qemu-work/debian-trixie.qcow2
        key: debian-trixie-image-${{ env.IMAGE_VERSION }}

    - name: Start Debian Trixie VM
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-2-start.sh

    - name: Install kernel + OpenZFS and stage truenas_ros
      timeout-minutes: 20
      env:
        TRAIN: ${{ steps.train.outputs.train }}
      run: bash .github/workflows/scripts/qemu-3-build.sh

    - name: Restart VM to load kernel modules
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-3.5-restart.sh

    - name: Run cargo tests (ZFS + privileged)
      timeout-minutes: 30
      run: bash .github/workflows/scripts/qemu-4-test.sh

    - name: Collect logs
      if: always()
      timeout-minutes: 5
      run: bash .github/workflows/scripts/qemu-5-collect-logs.sh

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-logs-debian-trixie
        path: /tmp/qemu-logs.tar.gz
        if-no-files-found: ignore

    - name: Test Summary
      if: always()
      run: bash .github/workflows/scripts/qemu-6-summary.sh
