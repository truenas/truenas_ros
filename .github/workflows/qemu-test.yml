name: QEMU VM Tests

on:
  pull_request:
  push:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  qemu-test:
    name: Debian Trixie QEMU Test (ZFS + privileged)
    runs-on: ubuntu-24.04
    env:
      # TrueNAS 26.0 ships the 6.18 kernel series and OpenZFS 2.4 is not
      # validated on anything newer — ZFS on a 7.x kernel is unsupported.
      # trixie-backports carries only its newest kernel (7.0.x now), so the VM
      # installs the last 6.18 it ever shipped from a pinned
      # snapshot.debian.org view of trixie-backports. The two values are
      # coupled (that snapshot serves exactly that version — qemu-3-build.sh
      # asserts it); bump them together when moving to a newer target kernel.
      KERNEL_APT_SNAPSHOT: "20260317T000000Z"
      KERNEL_DEB_VERSION: "6.18.15-1~bpo13+1"
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Setup QEMU
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-1-setup.sh

    - name: Get OpenZFS commit hash
      id: zfs-hash
      run: |
        ZFS_COMMIT=$(git ls-remote https://github.com/truenas/zfs.git refs/heads/truenas/zfs-2.4-release | cut -f1)
        echo "hash=$ZFS_COMMIT" >> $GITHUB_OUTPUT
        echo "OpenZFS commit: $ZFS_COMMIT"

    # The cached ZFS debs contain kmods built against the VM's pinned kernel;
    # modules cached for another kernel would install but never modprobe, so
    # the key includes the pinned version (qemu-3-build.sh asserts the VM
    # installed and booted exactly that kernel).
    - name: Cache OpenZFS packages
      id: cache-zfs
      uses: actions/cache@v4
      with:
        path: /tmp/zfs-debs
        key: zfs-debs-debian-trixie-${{ steps.zfs-hash.outputs.hash }}-${{ env.KERNEL_DEB_VERSION }}

    - name: Cache Debian Trixie image
      uses: actions/cache@v4
      with:
        path: /tmp/qemu-work/debian-trixie.qcow2
        key: debian-trixie-image-v1

    - name: Start Debian Trixie VM
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-2-start.sh

    - name: Build OpenZFS and stage truenas_ros
      timeout-minutes: 60
      env:
        ZFS_CACHE_HIT: ${{ steps.cache-zfs.outputs.cache-hit }}
      run: bash .github/workflows/scripts/qemu-3-build.sh

    - name: Restart VM to load kernel modules
      timeout-minutes: 10
      run: bash .github/workflows/scripts/qemu-3.5-restart.sh

    - name: Run cargo tests (ZFS + privileged)
      timeout-minutes: 30
      run: bash .github/workflows/scripts/qemu-4-test.sh

    - name: Collect logs
      if: always()
      timeout-minutes: 5
      run: bash .github/workflows/scripts/qemu-5-collect-logs.sh

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-logs-debian-trixie
        path: /tmp/qemu-logs.tar.gz
        if-no-files-found: ignore

    - name: Test Summary
      if: always()
      run: bash .github/workflows/scripts/qemu-6-summary.sh
